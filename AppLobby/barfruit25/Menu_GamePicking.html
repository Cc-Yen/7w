<style>
    .GemSlot {
        display: flex;
        flex-direction: row;
        width: 100%;
        height: 28%;
        align-items: center;
        justify-content: center;
    }

    .Gem {
        width: 7%;
        height: 49%;
        border: 1px solid;
        /* aqua */
        border-color: rgba(255, 0, 0, 0.49);
        border-top-left-radius: 77%;
        border-top-right-radius: 21%;
        border-bottom-right-radius: 77%;
        border-bottom-left-radius: 21%;
        background-color: var(--bColor);
        margin: 1px;
    }



    .State {

        font-size: 21px;
        border-top: 2px solid rgb(146, 130, 106);
    }

    .Msg {
        display: flex;
        width: 100%;
        height: fit-content;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        /* color: azure; 
        border: rgb(5, 202, 202) 2px solid;*/
        background-color: lightblue;
        /* box-sizing: border-box;
        border-width: 490px; */
        box-sizing: content-box;
        border-top-left-radius: 28%;
        border-top-right-radius: 15%;
        border-bottom-right-radius: 28%;
        border-bottom-left-radius: 15%;
    }
</style>
